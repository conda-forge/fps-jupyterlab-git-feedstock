schema_version: 1

context:
  version: "0.2.2"

package:
  name: fps-jupyterlab-git
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-jupyterlab-git/fps_jupyterlab_git-${{ version }}.tar.gz
    sha256: f57e8ff119bae1401d484f9748da5c94d714cc399a30ffdd17b7ed62c9b5ddc0

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - fps
    - fps-jupyter-server >=0.2.0,<0.3.0
    - jupyterlab-git

tests:
  - python:
      imports: fps_jupyterlab_git
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/jupyterlab_git
  summary: An FPS plugin for serving jupyterlab-git through a Jupyter server

extra:
  recipe-maintainers:
    - davidbrochart
